name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Server typecheck
        run: npm run typecheck:server

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test

      - name: Build Vercel bundle
        run: npm run build:vercel
